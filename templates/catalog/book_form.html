{% extends "base.html" %}

{% block title %}Форма книги{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-4">
                    {% if object %}Редагувати книгу{% else %}Додати книгу{% endif %}
                </h2>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <a href="{% url 'catalog:book_list' %}" class="btn btn-secondary">Скасувати</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
